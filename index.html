<!DOCTYPE html>
<html>
<head>
  <title>CathOS Lite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    h1 { margin-bottom: 10px; }
    .card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; }
    input, select { padding:8px; margin:5px; }
    button { padding:8px 12px; cursor:pointer; }
    table { width:100%; margin-top:10px; border-collapse:collapse; }
    th, td { padding:8px; border-bottom:1px solid #ddd; }
  </style>
</head>
<body>

<h1>💰 CathOS Lite</h1>

<!-- DASHBOARD -->
<div class="card">
  <h2>Net Worth</h2>
  <div id="networth">₱0</div>
</div>

<!-- ADD ACCOUNT -->
<div class="card">
  <h2>Add Account</h2>
  <input id="acc_name" placeholder="Account Name">
  <input id="acc_balance" type="number" placeholder="Balance">
  <select id="acc_type">
    <option value="personal">Personal</option>
    <option value="business">Business</option>
    <option value="reserve">Reserve</option>
  </select>
  <button onclick="addAccount()">Add</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
  <h2>Add Transaction</h2>
  <input id="t_desc" placeholder="Description">
  <input id="t_amount" type="number" placeholder="Amount">
  <select id="t_type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>
  <button onclick="addTransaction()">Add</button>

  <table id="txn_table"></table>
</div>

<!-- SUGARCANE -->
<div class="card">
  <h2>Sugarcane (Yearly)</h2>
  <input id="sc_year" placeholder="Year">
  <input id="sc_income" placeholder="Income">
  <input id="sc_expense" placeholder="Expense">
  <input id="sc_tons" placeholder="Tons">
  <button onclick="addSugarcane()">Add</button>

  <table id="sc_table"></table>
</div>

<script>
const supabase = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

let state = {
  accounts: [],
  transactions: [],
  sugarcane: []
};

function calculateNetWorth() {
  let cash = state.accounts.reduce((a,b)=>a+b.balance,0);
  let income = state.transactions
    .filter(t=>t.type==='income')
    .reduce((a,b)=>a+b.amount,0);
  let expense = state.transactions
    .filter(t=>t.type==='expense')
    .reduce((a,b)=>a+b.amount,0);

  let net = cash + income - expense;
  document.getElementById('networth').innerText = "₱" + net.toLocaleString();
}

function addAccount() {
  let acc = {
    name: acc_name.value,
    balance: Number(acc_balance.value),
    type: acc_type.value
  };
  state.accounts.push(acc);
  calculateNetWorth();
}

function addTransaction() {
  let t = {
    desc: t_desc.value,
    amount: Number(t_amount.value),
    type: t_type.value
  };
  state.transactions.push(t);
  renderTransactions();
  calculateNetWorth();
}

function renderTransactions() {
  let html = "<tr><th>Description</th><th>Amount</th><th>Type</th></tr>";
  state.transactions.forEach(t=>{
    html += `<tr>
      <td>${t.desc}</td>
      <td>${t.amount}</td>
      <td>${t.type}</td>
    </tr>`;
  });
  txn_table.innerHTML = html;
}

function addSugarcane() {
  let row = {
    year: Number(sc_year.value),
    income: Number(sc_income.value),
    expense: Number(sc_expense.value),
    tons: Number(sc_tons.value)
  };

  row.profit = row.income - row.expense;

  state.sugarcane.push(row);
  renderSugarcane();
}

function renderSugarcane() {
  let html = "<tr><th>Year</th><th>Income</th><th>Expense</th><th>Profit</th></tr>";
  state.sugarcane
    .sort((a,b)=>a.year-b.year)
    .forEach(r=>{
      html += `<tr>
        <td>${r.year}</td>
        <td>${r.income}</td>
        <td>${r.expense}</td>
        <td>${r.profit}</td>
      </tr>`;
    });
  sc_table.innerHTML = html;
}
</script>

</body>
</html>
